services:
  postgres:
    image: postgres:16-alpine
    container_name: energy_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword123}
      POSTGRES_DB: ${POSTGRES_DB:-EnergyAppDb}
      TZ: Asia/Bangkok
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: energy_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./EnergyApp.API
      dockerfile: Dockerfile
    container_name: energy_api
    ports:
      - "5008:5008"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=${POSTGRES_DB:-EnergyAppDb};Username=${POSTGRES_USER:-admin};Password=${POSTGRES_PASSWORD:-securepassword123};Port=5432"
      JwtSettings__Secret: ${JWT_SECRET:-MySuperSecretKeyForEnergyApp1234567890!!}
      AllowedOrigins: ${ALLOWED_ORIGINS:-http://localhost:5173}
      ASPNETCORE_ENVIRONMENT: Production
      TZ: Asia/Bangkok
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./my-web-app
      dockerfile: Dockerfile
    container_name: energy_frontend
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: always

volumes:
  pgdata:
  redisdata:
